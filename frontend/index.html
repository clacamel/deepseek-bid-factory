<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 标书AI工厂 - MVP版本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.5s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .output-section {
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 20px;
            font-size: 0.95em;
            line-height: 1.6;
            color: #333;
        }

        .output-section h3 {
            color: #667eea;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .output-section h3:first-child {
            margin-top: 0;
        }

        .output-section p {
            margin-bottom: 10px;
            text-align: justify;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            color: #667eea;
            font-size: 0.95em;
        }

        .status.success {
            background: #f0fff4;
            border-left-color: #48bb78;
            color: #22543d;
        }

        .status.error {
            background: #fff5f5;
            border-left-color: #f56565;
            color: #742a2a;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .metadata {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 0.9em;
            color: #666;
        }

        .metadata p {
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .btn-primary {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 DeepSeek 标书AI工厂</h1>
            <p>AI驱动的智能投标文件生成系统 - MVP版本</p>
        </div>

        <div class="main">
            <!-- 输入面板 -->
            <div class="panel">
                <h2>📝 项目信息</h2>
                
                <div class="form-group">
                    <label for="company">投标单位名称 *</label>
                    <input type="text" id="company" placeholder="例: XX物业管理有限公司" value="" required>
                </div>

                <div class="form-group">
                    <label for="project">项目名称 *</label>
                    <input type="text" id="project" placeholder="例: XX政府园区物业管理服务" value="" required>
                </div>

                <div class="form-group">
                    <label for="type">项目类型</label>
                    <select id="type">
                        <option value="物业管理">物业管理</option>
                        <option value="保安服务">保安服务</option>
                        <option value="保洁服务">保洁服务</option>
                        <option value="绿化维护">绿化维护</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="generateOutlineOnly()">📋 仅生成目录</button>
                    <button class="btn-secondary" onclick="resetForm()">🔄 重置表单</button>
                    <button class="btn-primary" onclick="generateAll()">🚀 生成完整标书</button>
                </div>
            </div>

            <!-- 输出面板 -->
            <div class="panel">
                <h2>📄 生成结果</h2>
                
                <div id="status" class="status" style="display: none;">
                    <span class="spinner"></span>
                    <span id="statusText">正在生成...</span>
                </div>

                <div class="output-section" id="output"></div>
                <div class="metadata" id="metadata" style="display: none;"></div>
                
                <div style="margin-top: 15px;">
                    <button class="btn-secondary" onclick="downloadContent()" style="width: 100%;">⬇️ 下载结果 (TXT)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api/generate';
        let currentContent = '';

        async function generateAll() {
            const company = document.getElementById('company').value.trim();
            const project = document.getElementById('project').value.trim();
            const type = document.getElementById('type').value;

            if (!company || !project) {
                alert('请填写投标单位和项目名称');
                return;
            }

            await generate({
                company,
                project,
                type
            });
        }

        async function generateOutlineOnly() {
            const company = document.getElementById('company').value.trim();
            const project = document.getElementById('project').value.trim();
            const type = document.getElementById('type').value;

            if (!company || !project) {
                alert('请填写投标单位和项目名称');
                return;
            }

            showStatus('正在生成目录结构...');

            try {
                const response = await fetch(`${API_URL}/outline`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        company,
                        project,
                        type
                    })
                });

                const data = await response.json();

                if (data.success) {
                    let html = '<h3>📋 标书目录结构</h3>';
                    data.outline.sections.forEach((sec, i) => {
                        html += `<div style="margin: 15px 0;">`;
                        html += `<p style="font-weight: bold; color: #667eea;">${i + 1}. ${sec.title}</p>`;
                        if (sec.subsections) {
                            sec.subsections.forEach(sub => {
                                html += `<p style="margin-left: 20px; color: #666;">${sub.id} ${sub.title}</p>`;
                            });
                        }
                        html += `</div>`;
                    });
                    document.getElementById('output').innerHTML = html;
                    hideStatus();
                    showSuccess(`✅ 目录生成成功！${data.outline.sections.length} 个章节`);
                } else {
                    showError('❌ 生成失败: ' + data.error);
                }
            } catch (error) {
                showError('❌ 网络错误: ' + error.message);
            }
        }

        async function generate(project) {
            showStatus('正在生成标书，这可能需要几分钟...');

            try {
                const response = await fetch(`${API_URL}/all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(project)
                });

                const data = await response.json();

                if (data.success) {
                    currentContent = data.content;
                    
                    // 显示内容
                    let html = `<h3>📄 ${project.project}</h3>`;
                    html += data.content.replace(/\n/g, '<br/>');
                    document.getElementById('output').innerHTML = html;

                    // 显示元数据
                    const metaHtml = `
                        <p><strong>投标单位:</strong> ${data.metadata.company}</p>
                        <p><strong>项目名称:</strong> ${data.metadata.project}</p>
                        <p><strong>章节数:</strong> ${data.metadata.sections}</p>
                        <p><strong>估计字数:</strong> 约 ${data.metadata.estimatedWords} 字</p>
                        <p><strong>生成时间:</strong> ${new Date(data.metadata.generatedAt).toLocaleString()}</p>
                    `;
                    document.getElementById('metadata').innerHTML = metaHtml;
                    document.getElementById('metadata').style.display = 'block';

                    hideStatus();
                    showSuccess('✅ 标书生成成功！');
                } else {
                    showError('❌ 生成失败: ' + data.error);
                }
            } catch (error) {
                showError('❌ 网络错误: ' + error.message);
                console.error('Error:', error);
            }
        }

        function showStatus(text) {
            const status = document.getElementById('status');
            document.getElementById('statusText').textContent = text;
            status.style.display = 'flex';
        }

        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }

        function showSuccess(message) {
            showStatus(message);
            document.getElementById('status').classList.add('success');
            document.getElementById('status').classList.remove('error');
            setTimeout(() => hideStatus(), 3000);
        }

        function showError(message) {
            const status = document.getElementById('status');
            document.getElementById('statusText').textContent = message;
            status.classList.add('error');
            status.classList.remove('success');
            status.style.display = 'flex';
        }

        function resetForm() {
            document.getElementById('company').value = '';
            document.getElementById('project').value = '';
            document.getElementById('type').value = '物业管理';
            document.getElementById('output').innerHTML = '';
            document.getElementById('metadata').style.display = 'none';
            currentContent = '';
            hideStatus();
        }

        function downloadContent() {
            if (!currentContent) {
                alert('请先生成标书');
                return;
            }

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(currentContent));
            element.setAttribute('download', `标书_${new Date().toISOString().split('T')[0]}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // 页面加载完成提示
        window.addEventListener('load', () => {
            console.log('✅ 前端加载完成');
            console.log('📍 请确保后端服务运行在 http://localhost:3001');
        });
    </script>
</body>
</html>
